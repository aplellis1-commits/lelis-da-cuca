// ═══════════ LEITOR QR ═══════════
let qrStream = null;
let qrAnimFrame = null;
let qrCallback = null;

function abrirScanner(callback) {
  qrCallback = callback;
  const overlay = document.createElement("div");
  overlay.id = "qrOverlay";
  overlay.innerHTML = `
    <video id="qrVideo" autoplay playsinline muted></video>
    <canvas id="qrCanvasHidden"></canvas>
    <div id="qrFrame"><div class="box"></div></div>
    <div id="qrLine"></div>
    <div id="qrMsg">Aponte para o QR Code da etiqueta</div>
    <button id="qrClose" onclick="fecharScanner()">✕</button>`;
  document.body.appendChild(overlay);

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
  }).then(stream => {
    qrStream = stream;
    const video = document.getElementById("qrVideo");
    video.srcObject = stream;
    video.play();
    video.addEventListener("loadedmetadata", () => scanLoop(video));
  }).catch(err => {
    fecharScanner();
    alert("Não foi possível acessar a câmera: " + err.message);
  });
}

function scanLoop(video) {
  const canvas = document.getElementById("qrCanvasHidden");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
  if (code && code.data) {
    fecharScanner();
    qrCallback(code.data.trim());
    return;
  }
  qrAnimFrame = requestAnimationFrame(() => scanLoop(video));
}

function fecharScanner() {
  cancelAnimationFrame(qrAnimFrame);
  if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
  document.getElementById("qrOverlay")?.remove();
}

// ═══════════ BOOT ═══════════
(async function init(){
  const cw = document.getElementById("configWarn");
  if(!configOK){
    cw.innerHTML = '<div class="config-warn">⚙️ Configure o Supabase: cole a URL e a chave no topo do arquivo.</div>';
    document.getElementById("btnLogin").disabled = true;
    return;
  }
  if(token){
    try{ const r = await rpc("app_me",{p_token:token}); if(r && !r.erro){ me=r; await pos_login(); return; } }catch(e){}
    token=null; localStorage.removeItem("brecho_token");
  }
})();

async function entrar(){
  const u=document.getElementById("inUser").value.trim();
  const p=document.getElementById("inPass").value;
  const m=document.getElementById("msgLogin");
  if(!u||!p){ m.innerHTML='<div class="msg err">Preencha usuário e senha.</div>'; return; }
  document.getElementById("btnLogin").disabled=true;
  try{
    const r=await rpc("app_login",{p_user:u,p_senha:p});
    if(r.erro){ m.innerHTML='<div class="msg err">'+esc(r.erro)+'</div>'; document.getElementById("btnLogin").disabled=false; return; }
    token=r.token; localStorage.setItem("brecho_token",token);
    me=await rpc("app_me",{p_token:token});
    await pos_login();
  }catch(e){ m.innerHTML='<div class="msg err">Erro de conexão. Verifique as chaves do Supabase.</div>'; document.getElementById("btnLogin").disabled=false; }
}

async function pos_login(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("appWrap").classList.remove("hidden");
  lojas = await rpc("app_lojas",{p_token:token}) || [];
  if(!isMaster()) lojaFiltro = me.loja_id;
  view="dashboard"; render();
}

function sair(){
  token=null; me=null; localStorage.removeItem("brecho_token");
  document.getElementById("appWrap").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("inPass").value=""; document.getElementById("btnLogin").disabled=false;
  document.getElementById("msgLogin").innerHTML="";
}

function abrirEdit(p){
  // fecha o modal de detalhe
  document.querySelector(".modal-bg")?.remove();

  // estado local de edição
  const ed = {
    tamanho: p.tamanho||"",
    marca:   p.marca||"",
    cor:     p.cor||"",
    condicao: p.condicao||"Bom",
    precoVenda: p.preco_venda||"",
    precoCusto: p.preco_custo||"",
    categoria: p.categoria||"",
    genero:  p.genero||"feminino",
    fotoData: null
  };

  const d=document.createElement("div");
  d.className="modal-bg"; d.onclick=()=>d.remove();

  function renderEdit(){
    d.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;margin-bottom:14px">
        <b style="font-size:16px">Editar — ${esc(p.codigo)}</b>
        <button class="x" style="margin-left:auto" onclick="this.closest('.modal-bg').remove()">${ic.x}</button>
      </div>

      ${/* foto atual ou placeholder */''}
      <div style="background:var(--rox-c);border-radius:12px;height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden" id="editFotoPreview">
        ${ed.fotoData
          ? `<img src="${ed.fotoData}" style="width:100%;height:100%;object-fit:cover">`
          : p.foto_url
            ? `<img src="${esc(p.foto_url)}" style="width:100%;height:100%;object-fit:cover">`
            : ic.shirt}
      </div>
      <div class="btn-row" style="margin-bottom:14px">
        <button type="button" class="btn btn-out" style="font-size:13px;padding:10px" onclick="document.getElementById('editCam').click()">📷 Câmera</button>
        <button type="button" class="btn btn-out" style="font-size:13px;padding:10px" onclick="document.getElementById('editGal').click()">🖼️ Galeria</button>
      </div>
      <input id="editCam" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleEditFoto(this)">
      <input id="editGal" type="file" accept="image/*" style="display:none" onchange="handleEditFoto(this)">

      ${isMaster()?`
      <div class="field"><label>Categoria</label><select id="eCategoria">
        ${CATEGORIAS.map(c=>`<option ${ed.categoria===c?'selected':''}>${c}</option>`).join("")}
      </select></div>
      <div class="field"><label>Gênero</label><div class="chips">
        ${[["feminino","Feminino"],["masculino","Masculino"],["unissex","Unissex"]].map(([k,l])=>`<button type="button" class="chip ${ed.genero===k?'on':''}" onclick="editSetGenero('${k}')">${l}</button>`).join("")}
      </div></div>
      `:''}

      <div class="grid2">
        <div class="field"><label>Tamanho</label>
          <input id="eTamanho" list="etamlist" value="${esc(ed.tamanho)}" placeholder="M, 38…">
          <datalist id="etamlist">${TAMANHOS.map(t=>`<option value="${t}">`).join("")}</datalist>
        </div>
        <div class="field"><label>Condição</label><select id="eCondicao">
          ${CONDICOES.map(c=>`<option ${ed.condicao===c?'selected':''}>${c}</option>`).join("")}
        </select></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Marca</label><input id="eMarca" value="${esc(ed.marca)}"></div>
        <div class="field"><label>Cor</label><input id="eCor" value="${esc(ed.cor)}"></div>
      </div>
      ${isMaster()?`<div class="grid2">
        <div class="field"><label>Custo (R$)</label><input id="eCusto" type="number" value="${ed.precoCusto}"></div>
        <div class="field"><label>Venda (R$)</label><input id="eVenda" type="number" value="${ed.precoVenda}"></div>
      </div>`:`<div class="field"><label>Preço de venda (R$)</label><input id="eVenda" type="number" value="${ed.precoVenda}"></div>`}

      <div id="msgEdit"></div>
      <button class="btn" style="margin-top:4px" onclick="salvarEdit('${p.id}')">Salvar alterações</button>
    </div>`;
  }

  // expõe funções locais no window para os handlers inline
  window._editEd = ed;
  window._editRender = renderEdit;
  window.handleEditFoto = function(input){
    const f=input.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const max=900; let w=img.width,h=img.height;
        if(w>h && w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        window._editEd.fotoData=cv.toDataURL("image/jpeg",0.72);
        const prev=document.getElementById("editFotoPreview");
        if(prev) prev.innerHTML=`<img src="${window._editEd.fotoData}" style="width:100%;height:100%;object-fit:cover">`;
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };
  window.editSetGenero = function(k){
    window._editEd.genero=k; window._editRender();
  };
  window.salvarEdit = async function(id){
    const m=document.getElementById("msgEdit");
    // lê campos do DOM
    const payload={
      tamanho: (document.getElementById("eTamanho")?.value||"").trim(),
      marca:   (document.getElementById("eMarca")?.value||"").trim(),
      cor:     (document.getElementById("eCor")?.value||"").trim(),
      condicao: document.getElementById("eCondicao")?.value||"Bom",
      preco_venda: +(document.getElementById("eVenda")?.value)||0
    };
    if(isMaster()){
      payload.categoria = document.getElementById("eCategoria")?.value||"";
      payload.genero    = window._editEd.genero;
      payload.preco_custo = +(document.getElementById("eCusto")?.value)||0;
    }
    if(!payload.preco_venda){ m.innerHTML='<div class="msg err">Informe o preço de venda.</div>'; return; }
    try{
      const r=await rpc("app_editar_peca",{p_token:token,p_id:id,p_dados:payload});
      if(r&&r.erro){ m.innerHTML='<div class="msg err">'+esc(r.erro)+'</div>'; return; }
      // foto nova?
      if(window._editEd.fotoData){
        try{ await enviarFoto(id, window._editEd.fotoData); }catch(e){ console.warn("Foto:",e); }
      }
      d.remove(); render();
    }catch(e){ m.innerHTML='<div class="msg err">Erro: '+esc(e.message||e)+'</div>'; }
  };

  renderEdit();
  document.body.appendChild(d);
}

async function salvarPeca(){
  const m=document.getElementById("msgCad");
  if(isMaster()&&!fCad.loja){m.innerHTML='<div class="msg err">Selecione a loja.</div>';return;}
  if(fCad.codigoModo==='manual' && !fCad.codigo.trim()){m.innerHTML='<div class="msg err">Digite o código ou escolha "Gerar automático".</div>';return;}
  if(!fCad.categoria){m.innerHTML='<div class="msg err">Selecione a categoria.</div>';return;}
  if(!fCad.precoVenda){m.innerHTML='<div class="msg err">Informe o preço de venda.</div>';return;}
  try{
    const r=await rpc("app_criar_peca",{p_token:token,p_loja:fCad.loja||null,
      p_codigo: fCad.codigoModo==='manual'?fCad.codigo.trim():null,
      p_genero:fCad.genero,p_categoria:fCad.categoria,p_tamanho:fCad.tamanho||null,
      p_marca:fCad.marca||null,p_cor:fCad.cor||null,p_condicao:fCad.condicao,
      p_custo:+fCad.precoCusto||0,p_venda:+fCad.precoVenda});
    if(r.erro){m.innerHTML='<div class="msg err">'+esc(r.erro)+'</div>';return;}
    if(fCad.fotoData && r.peca_id){ try{ await enviarFoto(r.peca_id, fCad.fotoData); }catch(e){} }
    const lj=fCad.loja, gen=fCad.genero, cat=fCad.categoria, cm=fCad.codigoModo;
    fCad={codigoModo:cm,codigo:"",genero:gen,categoria:cat,tamanho:"",marca:"",cor:"",condicao:"Bom",precoCusto:"",precoVenda:"",loja:lj,fotoData:null};
    await vCadastro(document.getElementById("app"));
    document.getElementById("msgCad").innerHTML='<div class="msg ok">✓ '+esc(r.codigo)+' cadastrada!</div>';
  }catch(e){m.innerHTML='<div class="msg err">Erro: '+esc(e.message||e)+'</div>';}
}

function handleFoto(input){
  const f=input.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=900; let w=img.width,h=img.height;
      if(w>h && w>max){ h=h*max/w; w=max; } else if(h>max){ w=w*max/h; h=max; }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      fCad.fotoData=cv.toDataURL("image/jpeg",0.72);
      const prev=document.getElementById("fotoPreview");
      if(prev) prev.innerHTML='<img src="'+fCad.fotoData+'" style="width:100%;max-width:160px;border-radius:12px;display:block">';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}
async function enviarFoto(pecaId, dataUrl){
  const res=await fetch(dataUrl); const blob=await res.blob();
  const path=pecaId+"_"+Date.now()+".jpg";
  const up=await sb.storage.from("fotos").upload(path, blob, {contentType:"image/jpeg",upsert:true});
  if(up.error) throw up.error;
  const url=sb.storage.from("fotos").getPublicUrl(path).data.publicUrl;
  await rpc("app_set_foto",{p_token:token,p_peca:pecaId,p_url:url});
  return url;
}

function normKey(k){return (k==null?"":k).toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}

function handleImport(input){
  const f=input.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const m=document.getElementById("msgImp");
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
      impRows=json.map(r=>{const o={};Object.keys(r).forEach(k=>o[normKey(k)]=r[k]);return o;});
      const validas=impRows.filter(r=>(r["categoria"]||"")!=="" && (r["venda"]||"")!=="").length;
      // detecta se alguma linha tem coluna loja preenchida
      const temLoja=isMaster() && impRows.some(r=>(r["loja"]||"").toString().trim()!=="");
      m.innerHTML='<div class="msg ok">'+impRows.length+' linha(s) lidas · '+validas+' válida(s)'+(temLoja?' · coluna Loja detectada':'')+'.</div>';
      const b=document.getElementById("btnImp"); if(b) b.disabled=impRows.length===0;
    }catch(err){ impRows=[]; m.innerHTML='<div class="msg err">Não consegui ler o arquivo. Use o modelo .xlsx.</div>'; }
  };
  reader.readAsBinaryString(f);
}

// ★ ATUALIZADO: resolve loja por nome quando coluna Loja preenchida (Master)
async function importarPlanilha(){
  const m=document.getElementById("msgImp");
  if(!impRows.length){m.innerHTML='<div class="msg err">Nenhuma planilha carregada.</div>';return;}

  // Se não-Master: loja fixa
  // Se Master sem seletor e sem coluna loja: exige seletor
  const temColunaLoja = impRows.some(r=>(r["loja"]||"").toString().trim()!=="");
  if(isMaster() && !fCad.loja && !temColunaLoja){
    m.innerHTML='<div class="msg err">Selecione a loja de destino no topo da tela ou preencha a coluna "Loja" na planilha.</div>'; return;
  }

  // monta mapa nome→id para resolver coluna Loja
  const lojaMap={};
  lojas.forEach(l=>{ lojaMap[l.nome.trim().toLowerCase()]=l.id; });

  const itens=impRows.map(r=>{
    // resolve loja da linha: coluna Loja → fallback seletor → null (para não-Master o back usa loja do token)
    let lojaId = fCad.loja || null;
    if(isMaster()){
      const nomeLinha=(r["loja"]||"").toString().trim();
      if(nomeLinha){
        const resolvido = lojaMap[nomeLinha.toLowerCase()];
        lojaId = resolvido || fCad.loja || null; // se nome não bater, cai no seletor
      }
    }
    return {
      loja_id: lojaId,
      codigo:(r["codigo"]||"").toString().trim(),
      categoria:(r["categoria"]||"").toString().trim(),
      genero:(r["genero"]||"feminino").toString().trim(),
      tamanho:(r["tamanho"]||"").toString().trim(),
      marca:(r["marca"]||"").toString().trim(),
      cor:(r["cor"]||"").toString().trim(),
      condicao:(r["condicao"]||"Bom").toString().trim(),
      custo:(r["custo"]===""?"":(""+r["custo"]).replace(",",".")),
      venda:(r["venda"]===""?"":(""+r["venda"]).replace(",","."))
    };
  });

  const b=document.getElementById("btnImp"); if(b) b.disabled=true;
  try{
    // ★ passa loja_id por item; o RPC app_importar_pecas precisa aceitar loja_id dentro de cada item
    const res=await rpc("app_importar_pecas",{p_token:token,p_loja:fCad.loja||null,p_itens:itens});
    if(res.erro){m.innerHTML='<div class="msg err">'+esc(res.erro)+'</div>'; if(b) b.disabled=false; return;}
    impRows=[];
    m.innerHTML='<div class="msg ok">✓ '+res.inseridas+' peça(s) importada(s)'+(res.ignoradas?(' · '+res.ignoradas+' ignorada(s)'):'')+'.</div>';
  }catch(e){m.innerHTML='<div class="msg err">Erro: '+esc(e.message||e)+'</div>'; if(b) b.disabled=false;}
}

function scanPdv(){
  abrirScanner(async cod=>{
    const m=document.getElementById("msgPdv");
    const lista=await rpc("app_pecas",{p_token:token,p_loja:lojaFiltro,p_busca:cod,p_status:"em_estoque"})||[];
    const p=lista.find(x=>x.codigo.toLowerCase()===cod.toLowerCase());
    if(!p){if(m)m.innerHTML='<div class="msg err">Peça não encontrada: '+esc(cod)+'</div>';return;}
    if(carrinho.find(c=>c.id===p.id)){if(m)m.innerHTML='<div class="msg err">Peça já está no carrinho.</div>';return;}
    if(carrinho.length && carrinho[0].loja_id!==p.loja_id){if(m)m.innerHTML='<div class="msg err">A venda só pode ter peças de uma mesma loja.</div>';return;}
    carrinho.push(p); render();
  });
}

function atualizaTotal(){const st=carrinho.reduce((s,c)=>s+(+c.preco_venda),0);document.getElementById("totalPdv").textContent=brl(Math.max(0,st-(+descTotal||0)));}
async function addPdv(){
  const el=document.getElementById("codPdv"); const cod=el.value.trim();
  const m=document.getElementById("msgPdv");
  if(!cod) return;
  const lista=await rpc("app_pecas",{p_token:token,p_loja:lojaFiltro,p_busca:cod,p_status:"em_estoque"})||[];
  const p=lista.find(x=>x.codigo.toLowerCase()===cod.toLowerCase());
  if(!p){m.innerHTML='<div class="msg err">Peça não encontrada nesta loja ou indisponível.</div>';return;}
  if(carrinho.find(c=>c.id===p.id)){m.innerHTML='<div class="msg err">Peça já está no carrinho.</div>';return;}
  if(carrinho.length && carrinho[0].loja_id!==p.loja_id){m.innerHTML='<div class="msg err">A venda só pode ter peças de uma mesma loja.</div>';return;}
  carrinho.push(p); el.value=""; render();
}
function remPdv(i){carrinho.splice(i,1);render();}
async function finalizar(){
  if(!carrinho.length)return;
  const itens=carrinho.map(c=>({id:c.id,codigo:c.codigo,preco:+c.preco_venda}));
  try{
    const r=await rpc("app_registrar_venda",{p_token:token,p_itens:itens,p_pagamento:pagamento,p_desconto:+descTotal||0});
    if(r.erro){document.getElementById("msgPdv").innerHTML='<div class="msg err">'+esc(r.erro)+'</div>';return;}
    carrinho=[];descTotal="";render();
    document.getElementById("msgPdv").innerHTML='<div class="msg ok">✓ '+esc(r.numero)+' registrada — '+brl(r.total)+'</div>';
  }catch(e){document.getElementById("msgPdv").innerHTML='<div class="msg err">Erro: '+esc(e.message||e)+'</div>';}
}

  const hoje=new Date(now); hoje.setHours(0,0,0,0);
  return [["Hoje",hoje,now],["Semana",sem,now],["Mês",mes,now],["30 dias",new Date(now.getTime()-30*864e5),now],["90 dias",new Date(now.getTime()-90*864e5),now]];
}

async function expEstoque(fmt){ const rows=await rpc("app_raw_estoque",{p_token:token,p_loja:lojaFiltro})||[]; baixar(rows,"estoque",fmt); }
async function expVendas(fmt){ const rows=await rpc("app_raw_vendas",{p_token:token,p_loja:lojaFiltro,p_ini:relPeriodo.ini.toISOString(),p_fim:relPeriodo.fim.toISOString()})||[]; baixar(rows,"vendas",fmt); }
function baixar(rows,nome,fmt){
  const m=document.getElementById("msgExp");
  if(!rows||!rows.length){ if(m)m.innerHTML='<div class="msg err">Sem dados para exportar.</div>'; return; }
  const stamp=new Date().toISOString().slice(0,10);
  if(fmt==="xlsx" && window.XLSX){
    const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,nome); XLSX.writeFile(wb,nome+"_"+stamp+".xlsx");
  }else{
    const heads=Object.keys(rows[0]); let csv="\uFEFF"+heads.join(";")+"\n";
    rows.forEach(r=>{ csv+=heads.map(h=>{let v=r[h]==null?"":(""+r[h]); if(/[;"\n]/.test(v)) v='"'+v.replace(/"/g,'""')+'"'; return v;}).join(";")+"\n"; });
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=nome+"_"+stamp+".csv"; a.click();
  }
  if(m)m.innerHTML='<div class="msg ok">✓ Arquivo gerado.</div>';
}

async function criarLoja(){
  const nome=document.getElementById("nomeLoja").value.trim();
  const m=document.getElementById("msgLoja");
  if(!nome){m.innerHTML='<div class="msg err">Informe o nome.</div>';return;}
  const r=await rpc("app_criar_loja",{p_token:token,p_nome:nome});
  if(r.erro){m.innerHTML='<div class="msg err">'+esc(r.erro)+'</div>';return;}
  lojas=await rpc("app_lojas",{p_token:token})||[]; render();
}
let fU={nome:"",usuario:"",senha:"",papel:"vendedor",loja:"",perms:["vendas","estoque"]};
async function adminUsuarios(){
  const body=document.getElementById("adminBody");
  const us=await rpc("app_usuarios",{p_token:token})||[];
  body.innerHTML=`<div class="card">
      <div style="font-weight:600;color:var(--rox);margin-bottom:12px">Criar usuário</div>
      <div class="grid2">
        <div class="field"><label>Nome</label><input value="${esc(fU.nome)}" oninput="fU.nome=this.value"></div>
        <div class="field"><label>Usuário (login)</label><input value="${esc(fU.usuario)}" oninput="fU.usuario=this.value"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Senha</label><input value="${esc(fU.senha)}" oninput="fU.senha=this.value"></div>
        <div class="field"><label>Loja</label><select onchange="fU.loja=this.value">
          <option value="">Selecione…</option>${lojas.map(l=>`<option value="${l.id}" ${fU.loja===l.id?'selected':''}>${esc(l.nome)}</option>`).join("")}
        </select></div>
      </div>
      <div class="field"><label>Tipo</label><div class="chips">
        ${[["parceiro","Parceiro (loja)"],["vendedor","Vendedor"]].map(([k,l])=>`<button class="chip ${fU.papel===k?'on':''}" onclick="fU.papel='${k}';render()">${l}</button>`).join("")}
      </div></div>
      <div class="field"><label>Permissões de acesso</label><div class="chips">
        ${PERMS.map(([k,l])=>`<button class="chip ${fU.perms.includes(k)?'on':''}" onclick="togglePerm('${k}')">${l}</button>`).join("")}
      </div></div>
      <div id="msgU"></div>
      <button class="btn" onclick="criarUsuario()">Criar usuário</button>
    </div>
    <div style="font-weight:600;color:#555;margin:14px 0 8px;font-size:14px">Usuários cadastrados</div>
    ${us.length===0?'<div class="empty">Nenhum usuário ainda.</div>':us.map(u=>`<div class="ulist">
      <div class="top"><b>${esc(u.nome)}</b><span class="tag">@${esc(u.usuario)}</span>
        <span class="tag" style="background:${u.ativo?'#dcfce7':'#fee2e2'};color:${u.ativo?'#15803d':'#b91c1c'}">${u.ativo?'ativo':'inativo'}</span>
        <span style="margin-left:auto;font-size:11px;color:#888">${esc(u.loja_nome||'sem loja')}</span></div>
      <div style="font-size:11px;color:#888;margin-top:6px">${esc((u.permissoes||[]).join(", "))}</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="chip" style="font-size:12px" onclick="redefinir('${u.id}','${esc(u.nome)}')">Redefinir senha</button>
        <button class="chip" style="font-size:12px" onclick="toggleU('${u.id}',${!u.ativo})">${u.ativo?'Desativar':'Ativar'}</button>
      </div></div>`).join("")}`;
}
function togglePerm(k){ fU.perms.includes(k)?fU.perms=fU.perms.filter(x=>x!==k):fU.perms.push(k); render(); }
async function criarUsuario(){
  const m=document.getElementById("msgU");
  if(!fU.nome||!fU.usuario||!fU.senha){m.innerHTML='<div class="msg err">Preencha nome, usuário e senha.</div>';return;}
  if(!fU.loja){m.innerHTML='<div class="msg err">Selecione a loja.</div>';return;}
  if(fU.senha.length<4){m.innerHTML='<div class="msg err">Senha muito curta (mín. 4).</div>';return;}
  const r=await rpc("app_criar_usuario",{p_token:token,p_nome:fU.nome,p_usuario:fU.usuario,p_senha:fU.senha,p_papel:fU.papel,p_loja_id:fU.loja,p_permissoes:fU.perms});
  if(r.erro){m.innerHTML='<div class="msg err">'+esc(r.erro)+'</div>';return;}
  fU={nome:"",usuario:"",senha:"",papel:"vendedor",loja:"",perms:["vendas","estoque"]}; render();
}
async function toggleU(id,ativo){ await rpc("app_toggle_usuario",{p_token:token,p_id:id,p_ativo:ativo}); render(); }
async function redefinir(id,nome){
  const nova=prompt("Nova senha para "+nome+":");
  if(!nova) return; if(nova.length<4){alert("Senha muito curta.");return;}
  const r=await rpc("app_redefinir_senha",{p_token:token,p_id:id,p_senha:nova});
  if(r.erro){alert(r.erro);return;} alert("Senha redefinida.");
}
</script>
</body></html>
